apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: donation-service
  namespace: solidarytech-donation
  labels:
    app.kubernetes.io/name: donation-service
    app.kubernetes.io/component: donation
    app.kubernetes.io/part-of: solidarytech
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  # Permite no máximo 1 pod fora por vez em disrupção VOLUNTÁRIA (drain/upgrade)
  # → mantém o resto no ar. Com 2 réplicas mantém >=1; se o HPA subir p/ 5, mantém >=4.
  maxUnavailable: 1
  selector:
    matchLabels:
      app: donation-service
