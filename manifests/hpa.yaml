apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: donation-service
  namespace: solidarytech-donation
  labels:
    app.kubernetes.io/name: donation-service
    app.kubernetes.io/component: donation
    app.kubernetes.io/part-of: solidarytech
  annotations:
    # HPA entra depois do Deployment (wave 2)
    argocd.argoproj.io/sync-wave: "3"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: donation-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      # espera 5 min de estabilidade antes de reduzir (evita flapping)
      stabilizationWindowSeconds: 300
